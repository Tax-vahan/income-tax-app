version: "3.9"

services:
  tds-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: tds-api:latest
    container_name: tds-api

    # ── Ports ──────────────────────────────────────────────────────────
    ports:
      - "8001:8001"

    # ── Environment overrides ──────────────────────────────────────────
    # Secrets should be injected at runtime — do NOT hardcode TAN/PASSWORD here.
    # Use a .env file or your orchestrator's secret management.
    env_file:
      - .env           # optional; silently ignored if file is absent

    environment:
      PYTHONUNBUFFERED: "1"
      # Override CONFIG values at runtime (picked up by fetcher/utils/config.py)
      # TDS_TAN: "XXXX12345X"
      # TDS_PASSWORD: "yourpassword"

    # ── Shared memory — headless Chrome needs at least 512 MB ─────────
    shm_size: "2gb"

    # ── Persistent volumes ────────────────────────────────────────────
    volumes:
      # Downloaded Excel / JSON output files
      - ./downloads:/app/downloads
      # Job state survives container restarts
      - ./jobs.json:/app/jobs.json
      # Live-tail logs from the host:  tail -f tds_fetcher.log
      - ./tds_fetcher.log:/app/tds_fetcher.log
      # Session cache — skip Selenium login on restart if still valid
      - ./tds_session.json:/app/tds_session.json

    # ── Restart policy ────────────────────────────────────────────────
    restart: unless-stopped

    # ── Resource limits (tune to your server) ─────────────────────────
    deploy:
      resources:
        limits:
          memory: 3G      # Chrome + Python
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

    # ── Logging ───────────────────────────────────────────────────────
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
