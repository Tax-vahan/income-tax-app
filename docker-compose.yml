services:
  tds-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: tds-api:latest
    container_name: tds-api

    # ── Ports ──────────────────────────────────────────────────────────
    ports:
      - "8001:8001"

    # ── Environment ────────────────────────────────────────────────────
    # To inject secrets without hardcoding, create a .env file:
    #   echo "TDS_TAN=XXXX12345X"    >> .env
    #   echo "TDS_PASSWORD=yourpw"   >> .env
    # Then uncomment the env_file line below.
    # env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      DATA_DIR: "/app/data"
      CHROME_BIN: "/usr/bin/chromium"
      CHROMEDRIVER_BIN: "/usr/bin/chromedriver"

    # ── Shared memory — headless Chromium requires ≥512 MB ────────────
    shm_size: "2gb"

    # ── Persistent volumes ────────────────────────────────────────────
    # Mount the whole /app/data directory so Docker never mistakes
    # a missing file for a directory.  All runtime outputs live here.
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads

    # ── Restart policy ────────────────────────────────────────────────
    restart: unless-stopped

    # ── Log rotation ──────────────────────────────────────────────────
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
